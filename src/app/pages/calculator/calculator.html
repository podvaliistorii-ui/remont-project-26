<section class="calculator-page fx-page">
  <div class="fx-page__container">
    <header class="calc-header">
      <span class="fx-kicker">PRECISE_COST_ENGINEERING</span>
      <h1 class="fx-title">Price Terminal</h1>
    </header>

    <div class="calc-grid">
      <div class="calc-inputs">
        <div class="input-group">
          <label>Total Area (m²)</label>
          <input type="number" [(ngModel)]="area" name="area" min="20" max="1000" />
        </div>

        <div class="input-group">
          <label>Renovation Type</label>
          <select [(ngModel)]="buildingType" name="type">
            <option value="cosmetic">Cosmetic</option>
            <option value="capital">Capital (Full)</option>
            <option value="designer">Designer Premium</option>
          </select>
        </div>
      </div>

      <div class="calc-result">
        <div class="result-card">
          <span class="result-label">Estimated Budget</span>
          <h2 class="result-value">₾ {{ formattedTotal() }}</h2>
          <p class="result-note">* Market Index: {{ market.currentMarketIndex() }}</p>
          
          <button class="btn-one" (click)="getEstimate()">
            Get Formal Estimate
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
