<section class="contact-page">
  <!-- Dynamic Office Coordinates -->
  <div class="office-coords mono" data-reveal>
    <span class="label">OFFICE_LOC</span>
    <span class="value">{{ displayCoords() }}</span>
  </div>

  <div class="contact-page__inner fx-page__container">
    <header class="contact-hero" data-reveal>
      <span class="fx-kicker">COMMUNICATION_PROTOCOL_V1</span>
      <h1 class="fx-title fx-serif">{{ 'CONTACT.TITLE' | translate }}</h1>
      <div class="header-line"></div>
    </header>

    <div class="contact-layout">
      <!-- Architectural Form -->
      <article class="contact-panel contact-panel--form" data-reveal>
        <form class="fx-form" #contactForm="ngForm" (ngSubmit)="submit(contactForm)">
          
          <div class="floating-field-group">
            <div class="fx-field-wrap">
              <input type="text" name="name" required [(ngModel)]="name" #nameRef="ngModel" [class.has-value]="name" />
              <label>{{ 'CONTACT.LABEL_NAME' | translate }}</label>
              <div class="field-line"></div>
            </div>

            <div class="fx-field-wrap">
              <input type="tel" name="phone" required [(ngModel)]="phone" #phoneRef="ngModel" [class.has-value]="phone" />
              <label>{{ 'CONTACT.LABEL_PHONE' | translate }}</label>
              <div class="field-line"></div>
            </div>
          </div>

          <div class="fx-field-wrap">
            <select name="district" required [(ngModel)]="district" [class.has-value]="district">
              <option value="" disabled></option>
              <option value="vake">VAKE_DISTRICT</option>
              <option value="saburtalo">SABURTALO_DISTRICT</option>
              <option value="mtatsminda">MTATSMINDA_DISTRICT</option>
              <option value="vera">VERA_DISTRICT</option>
              <option value="gldani">GLDANI_DISTRICT</option>
              <option value="isani">ISANI_DISTRICT</option>
              <option value="other">OTHER_LOCATION</option>
            </select>
            <label>{{ 'CONTACT.LABEL_DISTRICT' | translate }}</label>
            <div class="field-line"></div>
          </div>

          <div class="fx-field-wrap">
            <textarea name="brief" rows="4" required [(ngModel)]="brief" [class.has-value]="brief"></textarea>
            <label>{{ 'CONTACT.LABEL_BRIEF' | translate }}</label>
            <div class="field-line"></div>
          </div>

          <button class="contact-submit-btn" type="submit" [disabled]="contactForm.invalid || isSubmitting()">
            <span class="btn-text">
              @if (isSubmitting()) { IN_PROGRESS }
              @else if (sent()) { SYSTEM_SUCCESS }
              @else { INITIALIZE_REQUEST }
            </span>
            <span class="btn-arrow">&rarr;</span>
          </button>
        </form>
      </article>

      <!-- Interactive Map & Links -->
      <aside class="contact-panel contact-panel--info" data-reveal>
        
        <div class="info-links">
          <div class="info-item" (click)="copyToClipboard('+995 558 10 55 74', 'Phone')">
            <span class="info-label mono">01_VOICE</span>
            <span class="info-value">+995 558 10 55 74</span>
          </div>
          <div class="info-item" (click)="copyToClipboard('62 Chavchavadze Ave, Tbilisi', 'Address')">
            <span class="info-label mono">02_LOCATION</span>
            <span class="info-value">62 Chavchavadze Ave, Tbilisi</span>
          </div>
        </div>

        <div class="interactive-map-wrap">
          <svg class="tbilisi-svg" viewBox="0 0 400 300">
            <!-- Simplified Tbilisi Districts -->
            <path class="district-path" data-name="Vake" d="M150 150 L200 130 L220 160 L180 180 Z" />
            <path class="district-path" data-name="Saburtalo" d="M120 100 L170 80 L200 120 L150 140 Z" />
            <path class="district-path" data-name="Mtatsminda" d="M200 130 L250 120 L270 150 L220 160 Z" />
            <circle class="office-dot" cx="228" cy="148" r="4" />
            <circle class="office-pulse" cx="228" cy="148" r="10" />
          </svg>
          <div class="map-tooltip">WE_WORK_HERE</div>
        </div>

      </aside>
    </div>
  </div>

  <!-- Copy Toast -->
  <div class="copy-toast" [class.show]="copyToast().show">
    <span class="mono">{{ copyToast().text }}</span>
  </div>
</section>
