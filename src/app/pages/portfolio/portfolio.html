<section class="portfolio-page">
  <div class="gallery-scroll-wrapper" #scrollWrapper>
    <div class="gallery-sticky-container">
      
      <div class="fx-container portfolio-intro">
        <header class="portfolio-header">
          <span class="mono technical-label">8Y_PRECISION_ENGINEERING</span>
          <h1 class="fx-title fx-serif">{{ 'NAV.PORTFOLIO' | translate }}</h1>
          <div class="fx-divider is-visible"></div>
        </header>
      </div>

      <div class="projects-track" #track>
        @for (item of items(); track item.id; let i = $index) {
          <a class="project-entry" 
             [routerLink]="['/portfolio', item.id]"
             (click)="navigateToProject($event, item.id)">
            
            <div class="project-entry__visual">
              @if (item.mainMedia.type === 'video') {
                <video class="project-entry__media" autoplay muted loop playsinline preload="metadata" [poster]="item.mainMedia.poster || ''">
                  <source [src]="item.mainMedia.url" type="video/mp4">
                </video>
              } @else {
                <img [src]="item.mainMedia.url" 
                     [alt]="item.mainMedia.altKey ? (item.mainMedia.altKey | translate) : (item.titleKey | translate)" 
                     class="project-entry__media" 
                     [attr.fetchpriority]="i < 2 ? 'high' : 'low'" 
                     [attr.loading]="i < 2 ? 'eager' : 'lazy'" />
              }
              <div class="project-entry__overlay">
                <span class="view-btn mono">EXPLORE_NODE</span>
              </div>
            </div>

            <div class="project-entry__info">
              <div class="info-top">
                <span class="mono">{{ item.area }} m²</span>
                <span class="mono">{{ item.year }}</span>
              </div>
              <h2 class="project-name fx-serif">{{ item.titleKey | translate }}</h2>
              <p class="project-location mono">{{ item.districtKey | translate }}</p>
            </div>
          </a>
        }
      </div>

    </div>
  </div>
</section>
